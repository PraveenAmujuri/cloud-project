name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: SSH into EC2
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ubuntu
        key: ${{ secrets.EC2_KEY }}
        script: |
          if [ ! -d "cloud-project" ]; then
            git clone https://github.com/PraveenAmujuri/cloud-project.git
          fi
          cd cloud-project
          git pull origin main
          pip3 install -r requirements.txt
          sudo systemctl restart flaskapp